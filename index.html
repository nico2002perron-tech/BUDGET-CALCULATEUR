<!doctype html>
<html lang="fr" data-theme="sombre">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ta tour de contrôle financière — une vue composée pour ta situation, à partir de tes données qui restent sur ton appareil." />
    <!-- La peau, posée AVANT la première peinture : aucun flash. Le sombre est le
         défaut (VISION §12) ; un choix antérieur (localStorage) le remplace. -->
    <script>
      try {
        document.documentElement.dataset.theme = localStorage.getItem('gfsf.theme') || 'sombre'
      } catch (e) { document.documentElement.dataset.theme = 'sombre' }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Ta tour de contrôle</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
